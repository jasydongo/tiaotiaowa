<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d2b1a" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>蛙一跳 · Jumping Frog</title>
  <link rel="stylesheet" href="css/style.css?v=032" />
</head>
<body>
  <div id="game-wrap">
    <canvas id="game-canvas"></canvas>

    <!-- 顶部 HUD：分数 + 最高分 + 音效开关 + 辅助线开关 -->
    <div id="hud">
      <div class="score-box">
        <span class="score-current" id="score">0</span>
        <span class="score-jumps">跳跃 <b id="jumps">0</b></span>
        <span class="score-best">最高 <b id="best">0</b></span>
      </div>
      <div class="btn-group">
        <button id="aim-btn" class="icon-btn" title="显示/隐藏辅助线" aria-label="切换辅助线">
          <span id="aim-icon">🎯</span>
        </button>
        <button id="mute-btn" class="icon-btn" title="静音/开启音效" aria-label="切换音效">
          <span id="mute-icon">🔊</span>
        </button>
      </div>
    </div>

    <!-- 完美连击浮层 -->
    <div id="combo-pop"></div>

    <!-- 开始界面 -->
    <div id="start-screen" class="overlay">
      <div class="panel">
        <h1>蛙<span class="accent">一</span>跳</h1>
        <!-- 青蛙图片 -->
        <div class="frog-mascot">
          <svg viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
            <!-- 身体 -->
            <ellipse cx="60" cy="55" rx="38" ry="30" fill="#7ed957"/>
            <ellipse cx="60" cy="58" rx="30" ry="22" fill="#5cbf44"/>
            <!-- 肚子 -->
            <ellipse cx="60" cy="62" rx="20" ry="15" fill="#d8f5b0"/>
            <!-- 眼睛 -->
            <g class="eye left">
              <ellipse cx="40" cy="35" rx="12" ry="12" fill="#7ed957"/>
              <ellipse cx="40" cy="34" rx="9" ry="9" fill="#ffffff"/>
              <circle cx="42" cy="32" r="4" fill="#1a1a1a"/>
              <circle cx="44" cy="30" r="1.5" fill="#ffffff"/>
            </g>
            <g class="eye right">
              <ellipse cx="80" cy="35" rx="12" ry="12" fill="#7ed957"/>
              <ellipse cx="80" cy="34" rx="9" ry="9" fill="#ffffff"/>
              <circle cx="82" cy="32" r="4" fill="#1a1a1a"/>
              <circle cx="84" cy="30" r="1.5" fill="#ffffff"/>
            </g>
            <!-- 腿 -->
            <ellipse cx="25" cy="70" rx="10" ry="12" fill="#5cbf44" class="leg"/>
            <ellipse cx="95" cy="70" rx="10" ry="12" fill="#5cbf44" class="leg"/>
            <!-- 嘴巴 -->
            <path d="M 48 48 Q 60 58 72 48" stroke="#2c5e22" stroke-width="2" fill="none" class="mouth"/>
            <!-- 腮红 -->
            <ellipse cx="30" cy="48" rx="5" ry="3" fill="#ffb5c5" opacity="0.6" class="blush"/>
            <ellipse cx="90" cy="48" rx="5" ry="3" fill="#ffb5c5" opacity="0.6" class="blush"/>
          </svg>
        </div>
        <p class="subtitle">在森林的木桩与蘑菇间蓄力跳跃</p>
        <ul class="tips">
          <li><b>按住</b>蓄力，<b>松开</b>起跳</li>
          <li>落在平台中心 = <b>完美连击</b>，加倍得分</li>
          <li>掉落或跳过头就结束</li>
        </ul>
        <div class="key-hint">
          <span class="kbd">鼠标按住</span>
          <span class="kbd">触屏</span>
          <span class="kbd">空格</span>
        </div>
        <button id="start-btn" class="primary-btn">开始游戏</button>
      </div>
    </div>

    <!-- 游戏结束界面 -->
    <div id="over-screen" class="overlay hidden">
      <div class="panel">
        <h2 id="over-title">游戏结束</h2>
        <div class="final-scores">
          <div class="final-row"><span>本局得分</span><b id="final-score">0</b></div>
          <div class="final-row"><span>跳跃次数</span><b id="final-jumps">0</b></div>
          <div class="final-row"><span>历史最高</span><b id="final-best">0</b></div>
        </div>
        <p id="over-msg" class="subtitle"></p>
        <button id="restart-btn" class="primary-btn">再来一局</button>
      </div>
    </div>
  </div>

  <script src="js/game.js?v=054"></script>
</body>
</html>
